[build]
  command = "npm run build"
  publish = "build"

[[redirects]]
  from = "/robots.txt"
  to = "/.netlify/functions/robots"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
